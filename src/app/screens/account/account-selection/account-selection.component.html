<div class="selection-container">
  <div class="selection-card">
    <div class="selection-header">
      <h1>Bem-vindo de volta!</h1>
      <p>Selecione uma conta para começar a gerenciar.</p>
    </div>

    <div *ngIf="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Carregando suas contas...</p>
    </div>

    <div *ngIf="!loading && error" class="error-state">
      <p>{{ error }}</p>
      <button (click)="loadAccounts()" class="btn-retry">Tentar Novamente</button>
    </div>

    <div *ngIf="!loading && !error && accounts.length === 0" class="no-accounts-state">
      <p>Você ainda não possui contas cadastradas.</p>
      <button routerLink="/account-setup" class="btn-add-account">
        <i class="bi bi-plus-circle"></i>
        Criar Minha Primeira Conta
      </button>
    </div>

    <div *ngIf="!loading && !error && accounts.length > 0" class="accounts-grid">
      <div 
        *ngFor="let account of accounts" 
        class="account-item" 
        (click)="selectAccount(account.id)"
      >
        <div class="account-icon">
          <i class="bi bi-bank"></i>
        </div>
        <div class="account-info">
          <h3>{{ account.accountName }}</h3>
          <p>{{ getAccountTypeLabel(account.accountType) }}</p>
          <span class="balance" [ngClass]="{'text-success': (account.monthlyBalance || 0) >= 0, 'text-danger': (account.monthlyBalance || 0) < 0}">
            Saldo: {{ (account.monthlyBalance || 0) | currency:'BRL' }}
          </span>
        </div>
        <div class="select-arrow">
          <i class="bi bi-chevron-right"></i>
        </div>
      </div>

      <button routerLink="/account-setup" class="btn-add-account">
        <i class="bi bi-plus-circle"></i>
        Criar Nova Conta
      </button>
    </div>
  </div>
</div>
