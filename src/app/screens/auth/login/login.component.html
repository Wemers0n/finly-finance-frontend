<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-container">
        <img src="/assets/logo-finly.png" alt="Finly Logo" class="main-logo">
      </div>
      <p>Acesse sua conta para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="seu@email.com"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
        <div class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          E-mail inválido
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Sua senha"
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
        <div class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Senha deve ter no mínimo 6 caracteres
        </div>
      </div>

      <div class="alert error" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-login">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="login-footer">
      <span>Não tem uma conta? </span>
      <a routerLink="/register">Registre-se agora</a>
    </div>
  </div>
</div>
